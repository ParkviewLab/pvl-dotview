name: Test

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Sync deps
        run: uv sync

      - name: Ruff
        run: uv run ruff check src/

      - name: Ty
        run: uv run ty check src/
